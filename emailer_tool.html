<!DOCTYPE html>
<html>
<head>
    <title>Emailer Tool UI</title>
    <style>
        body { font-family: sans-serif; background: #0f0e0d; color: #f5f0e8; padding: 50px; }
        .box { border: 1px solid #c1440e; padding: 20px; max-width: 500px; margin: auto; }
        input, textarea { width: 95%; margin: 10px 0; padding: 10px; background: #ede7d9; }
        button { background: #c1440e; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Auto Emailer Generator</h2>
        <input type="text" id="sub" placeholder="Subject">
        <textarea id="msg" placeholder="Your Message"></textarea>
        <button onclick="alert('Python Script Generated! Check your folder.')">Generate Python Script</button>
    </div>
</body>
</html>
